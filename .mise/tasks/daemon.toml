# Daemon + logging + secrets tasks — shared between dev and production.
# This SAME file is deployed to every device.
#
# LOGGING CONTRACT:
#   Daemons → pitchfork logs (persistent, queryable, web UI at :19876)
#   Tasks   → pitchfork run (persistent, retrievable via logs:task)
#
#   Log levels controlled by RUST_LOG in mise.toml:
#     Dev:  debug (see everything)         — .mise.toml
#     Prod: info (quiet, small footprint)  — config/mise.pi5.toml
#
#   After starting:  logs:errors runs automatically (engrained in start/restart)
#   Review tasks:    mise run logs:task -- build
#   Debug toggle:    mise run logs:debug / logs:normal
#   Web UI:          http://localhost:19876 (or http://<device>:19876)
#
# Daemons live in pitchfork.toml → opcua-server, howick-frama, mock-plat-trunk.
# (Speckle moved to its own repo: github.com/joeblew999/speckle)

# ── Root daemon lifecycle ────────────────────────────────────────────────────

[start]
description = "Start all daemons + check for errors"
run = [
  "pitchfork start -l",
  { task = "logs:errors" },
]

[stop]
description = "Stop all daemons"
run = "pitchfork stop --all"

[restart]
description = "Restart all daemons + check for errors"
run = [
  "pitchfork stop --all 2>/dev/null || true",
  "pitchfork start -l",
  { task = "logs:errors" },
]
run_windows = [
  "pitchfork stop --all",
  "pitchfork start -l",
  { task = "logs:errors" },
]

# ── Root daemon monitoring ───────────────────────────────────────────────────

[logs]
description = "Stream daemon logs"
raw = true
run = "pitchfork logs -t"

[status]
description = "Daemon status"
alias = "ps"
run = "pitchfork list"

[tui]
description = "Interactive pitchfork dashboard"
raw = true
interactive = true
run = "pitchfork tui"

# ── Log management ───────────────────────────────────────────────────────────

["logs:recent"]
description = "Last 5 minutes of daemon logs"
run = "pitchfork logs --since 5min --no-pager"

["logs:errors"]
description = "Grep daemon logs for errors"
run = "pitchfork logs --raw --no-pager | grep -iE 'error|panic|fatal' || echo 'No errors found'"
run_windows = 'pitchfork logs --raw --no-pager | findstr /i "error panic fatal" || echo No errors found'

["logs:task"]
description = "Show captured task output (build, test, check)"
usage = 'arg "[name]" help="Task name: build, test, or check" default="build"'
run = "pitchfork logs task-${usage_name} --raw --no-pager 2>/dev/null || echo 'No logs for task-${usage_name} — run the task first'"

["logs:where"]
description = "Show log locations and sizes"
run = """
echo "Pitchfork log directory:"
echo "  ~/.local/state/pitchfork/logs/"
echo ""
du -sh ~/.local/state/pitchfork/logs/*/ 2>/dev/null || echo "  (no logs yet)"
"""

["logs:clear"]
description = "Clear all daemon logs"
confirm = "Delete all daemon logs?"
run = "pitchfork logs --clear"

["logs:debug"]
description = "Restart daemons with debug logging (revert with logs:normal)"
run = """
pitchfork stop --all 2>/dev/null || true
RUST_LOG=debug pitchfork start -l
echo "Debug logging ON. Revert: mise run logs:normal"
"""
run_windows = [
  "pitchfork stop --all",
  "set RUST_LOG=debug && pitchfork start -l",
  "echo Debug logging ON. Revert: mise run logs:normal",
]

["logs:normal"]
description = "Restart daemons with default log level"
run = [
  { task = "restart" },
  "echo 'Logging reverted to default level'",
]

# ── Secrets (works on every device) ──────────────────────────────────────────

["secrets:list"]
description = "List all secrets"
run = "fnox list"

["secrets:check"]
description = "Validate secret configuration"
run = "fnox check"

["secrets:scan"]
description = "Scan repo for leaked secrets"
run = "fnox scan"
